[package]
name = "giql-datafusion"
version = "0.1.0"
edition = "2021"
description = "DataFusion optimizer for genomic interval (INTERSECTS) joins"
license = "MIT"

[dependencies]
arrow = { version = "55", default-features = false, features = ["prettyprint"] }
datafusion = "47"
futures = "0.3"
log = "0.4"
parquet = "55"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[dev-dependencies]
tempfile = "3"
