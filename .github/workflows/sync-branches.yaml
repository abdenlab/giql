name: Sync branches
description: Sync main, master, and release branches on PR merge.

on:
  pull_request:
    branches:
      - master
      - release
    types:
      - closed

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-main:
    name: Sync main
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.MY_TOKEN }}
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          WORKFLOW: ${{ github.workflow }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          workflow=$(echo "$WORKFLOW" | tr '[:upper:]' '[:lower:]')
          body='Auto-generated by the ['$workflow'](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.'
          existing=$(gh pr list --base main --head "$BASE_REF" --state open --json number --jq '.[0].number')
          if [[ -n "$existing" ]]; then
            echo "Sync PR #$existing already exists, skipping."
          else
            url=$(gh pr create -B main -H "$BASE_REF" --title "Sync main with $BASE_REF" --body "$body")
            gh pr merge "$url" --merge --admin
          fi

  sync-release:
    name: Sync release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.head_ref != 'release' && github.base_ref == 'master'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.MY_TOKEN }}
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          WORKFLOW: ${{ github.workflow }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --unshallow
          if [[ -n $(git ls-remote --heads origin release) ]]; then
            workflow=$(echo "$WORKFLOW" | tr '[:upper:]' '[:lower:]')
            body='Auto-generated by the ['$workflow'](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.'
            existing=$(gh pr list --base release --head "$BASE_REF" --state open --json number --jq '.[0].number')
            if [[ -n "$existing" ]]; then
              echo "Sync PR #$existing already exists, skipping."
            else
              url=$(gh pr create -B release -H "$BASE_REF" --title "Sync release with $BASE_REF" --body "$body")
              gh pr merge "$url" --merge --admin
            fi
          else
            echo "Release branch not found, skipping."
          fi
