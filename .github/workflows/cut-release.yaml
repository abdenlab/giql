name: Cut release
description: Cut a release branch and publish a release-candidate.

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        options:
          - major
          - minor
        default: minor

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-code-changes:
    name: Verify code has changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false
      - name: Get touched files
        id: get-touched-files
        uses: ./.github/actions/get-touched-files
        with:
          pathspec: 'src/ pyproject.toml'
      - name: Fail if code hasn't changed
        if: ${{ ! steps.get-touched-files.outputs.touched }}
        run: |
          echo "ERROR: No code changes detected."
          exit 1

  cut-release:
    name: Cut ${{ github.event.inputs.release-type }} release
    needs: verify-code-changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.cut-release-branch.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_TOKEN }}
      - name: Verify main is up to date
        run: |
          git fetch origin main
          git fetch origin master
          if [[ $(git rev-list --count --left-only origin/master..origin/main) -gt 0 ]]; then
            echo "Error: main is not up to date with master" >&2
            exit 1
          fi
      - name: Create release branch
        id: cut-release-branch
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}
        run: |
          version=$(.github/scripts/cut-release.sh "$RELEASE_TYPE" release)
          echo "Release candidate: $version"
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Checkout release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: release
          token: ${{ secrets.MY_TOKEN }}
      - name: Tag version
        env:
          VERSION: ${{ steps.cut-release-branch.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          WORKFLOW: ${{ github.workflow }}
          VERSION: ${{ steps.cut-release-branch.outputs.version }}
        run: |
          workflow=$(echo "$WORKFLOW" | tr '[:upper:]' '[:lower:]')
          body='Auto-generated by the ['$workflow'](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.'
          next_version=$(.github/scripts/bump-version.sh minor "$VERSION")
          gh pr create -B master -H release --title "Release $next_version" --body "$body"

  build-release:
    name: Build release
    needs: cut-release
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/build-release
        with:
          version: ${{ needs.cut-release.outputs.version }}

  publish-github-release:
    name: Publish release to GitHub
    needs:
      - cut-release
      - build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/publish-github-release
        with:
          version: ${{ needs.cut-release.outputs.version }}

  publish-pypi-release:
    name: Publish release to PyPI
    needs:
      - cut-release
      - build-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/publish-pypi-release
        with:
          version: ${{ needs.cut-release.outputs.version }}
          pypi-token: ${{ secrets.PYPI_TOKEN }}
